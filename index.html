<!DOCTYPE html>
<html>
<head>
  <title>Auto Camera Capture</title>

  <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

  <style>
    body {
      font-family: sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 16px;
      text-align: center;
    }

    video {
      display: block;
      margin: auto;
      border-radius: 8px;
      background: #000;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      color: #555;
      font-weight: bold;
    }

    #smileScore {
      margin-top: 8px;
      font-size: 18px;
      color: #111;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>Auto Camera Capture</h2>

  <video id="video" autoplay playsinline width="320"></video>

  <p id="status">Starting camera...</p>
  <p id="smileScore">Smile Score: Loading...</p>

  <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const statusEl = document.getElementById("status");
    const smileScoreEl = document.getElementById("smileScore");

    let lastSmileScore = 0;

    async function loadModels() {
      try {
        const MODEL_URL = "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model";

        await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);

        console.log("Smile models loaded");
      } catch (err) {
        console.error("Model load failed:", err);
      }
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false
        });

        video.srcObject = stream;

        video.onloadedmetadata = async () => {
          await video.play();

          statusEl.textContent = "Camera ready";

          setTimeout(async () => {
            if (window.faceapi) {
              await startSmileDetection();
            } else {
              smileScoreEl.textContent = "Smile Score: Not available";
              capturePhoto();
            }
          }, 1000);
        };

      } catch (err) {
        console.error(err);
        statusEl.textContent = "Camera access denied: " + err.message;
      }
    }

    async function startSmileDetection() {
      let attempts = 0;

      const interval = setInterval(async () => {
        attempts++;

        await detectSmile();

        if (attempts >= 8) {
          clearInterval(interval);
          capturePhoto();
        }
      }, 300);
    }

    async function detectSmile() {
      try {
        const detection = await faceapi
          .detectSingleFace(
            video,
            new faceapi.TinyFaceDetectorOptions({
              inputSize: 224,
              scoreThreshold: 0.5
            })
          )
          .withFaceLandmarks();

        if (!detection) {
          smileScoreEl.textContent = "Smile Score: Face not detected";
          return;
        }

        const mouth = detection.landmarks.getMouth();

        const left = mouth[0];
        const right = mouth[6];
        const top = mouth[13];
        const bottom = mouth[19];

        const mouthWidth = Math.hypot(
          right.x - left.x,
          right.y - left.y
        );

        const mouthHeight = Math.hypot(
          bottom.x - top.x,
          bottom.y - top.y
        );

        let ratio = mouthHeight / mouthWidth;

        let smilePercent = Math.round(ratio * 550);

        smilePercent = Math.max(1, Math.min(100, smilePercent));

        lastSmileScore = smilePercent;

        smileScoreEl.textContent =
          `Smile Score: ${smilePercent}%`;

      } catch (err) {
        console.error(err);
        smileScoreEl.textContent = "Smile detection error";
      }
    }

    async function capturePhoto() {
      statusEl.textContent =
        `Capturing photo... Smile Score: ${lastSmileScore}%`;

      const context = canvas.getContext("2d");

      context.drawImage(
        video,
        0,
        0,
        canvas.width,
        canvas.height
      );

      const imageData = canvas.toDataURL("image/png");

      try {
        const res = await fetch("/api/upload-photo", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            imageData,
            smileScore: lastSmileScore
          })
        });

        if (!res.ok) {
          const errorText = await res.text();
          throw new Error(errorText || "Upload failed");
        }

        statusEl.textContent =
          `Photo saved! Smile Score: ${lastSmileScore}%`;

      } catch (err) {
        console.error(err);
        statusEl.textContent = "Upload Error: " + err.message;
      }
    }

    window.addEventListener("load", async () => {
      await startCamera();

      try {
        await loadModels();
        smileScoreEl.textContent = "Smile detector ready";
      } catch (err) {
        console.error(err);
        smileScoreEl.textContent = "Smile detector unavailable";
      }
    });
  </script>

</body>
</html>
