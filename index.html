<!DOCTYPE html>
<html>
<head>
  <title>Auto Camera Capture</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; }
    video { display: block; border-radius: 8px; background: #000; }
    #status { margin-top: 10px; font-size: 14px; color: #555; font-weight: bold; }
    #photos img { width: 150px; height: 112px; object-fit: cover; border-radius: 6px; margin: 5px; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <h2>Auto-Capture Test</h2>
  <video id="video" autoplay playsinline width="300"></video>
  <p id="status">Starting camera...</p>

  <canvas id="canvas" width="300" height="225" style="display:none;"></canvas>

  <div id="gallery">
    <h3>Gallery</h3>
    <div id="photos"></div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const statusEl = document.getElementById("status");

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false
        });
        video.srcObject = stream;

        // Wait for the video to actually start playing before capturing
        video.onloadedmetadata = () => {
          startCountdown(3);
        };
      } catch (err) {
        statusEl.textContent = "Camera access denied: " + err.message;
      }
    }

    function startCountdown(seconds) {
      statusEl.textContent = `Camera active. Capturing in ${seconds}...`;
      if (seconds <= 0) {
        capturePhoto();
        return;
      }
      setTimeout(() => startCountdown(seconds - 1), 1000);
    }

    async function capturePhoto() {
      statusEl.textContent = "Auto-capturing...";
      const context = canvas.getContext("2d");
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = canvas.toDataURL("image/png");

      try {
        const res = await fetch("/api/upload-photo", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ imageData })
        });

        if (!res.ok) throw new Error("Upload failed");
        statusEl.textContent = "Auto-capture saved!";
        loadGallery();
      } catch (err) {
        statusEl.textContent = "Error: " + err.message;
      }
    }

    async function loadGallery() {
      try {
        const res = await fetch('/api/get-photos');
        if (!res.ok) return;
        const { photos } = await res.json();
        const photosEl = document.getElementById('photos');
        photosEl.innerHTML = '';
        photos.forEach(photo => {
          const img = document.createElement('img');
          img.src = photo.url || photo.data;
          photosEl.appendChild(img);
        });
      } catch (err) {
        console.error('Gallery load error:', err);
      }
    }

    startCamera();
    loadGallery();
  </script>
</body>
</html>
